<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What a mom and her stepdaughter get up to when dad ain’t home</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
    }

    .player{
      position:relative;
      width:100%;
      height:100vh;
      background:url('https://cdn.aceimg.com/98eb2836a.jpg') center center/cover no-repeat;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(
        to top,
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.25)
      );
      backdrop-filter: blur(2px);
    }

    .play-wrapper{
      position:relative;
      z-index:2;
      width:95px;
      height:95px;
      border-radius:50%;
      background:rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.35);
      backdrop-filter: blur(8px);
      display:flex;
      justify-content:center;
      align-items:center;
      box-shadow:0 8px 30px rgba(0,0,0,0.45);
      transition:all 0.3s ease;
    }

    .play-wrapper:hover{
      transform:scale(1.08);
      background:rgba(255,255,255,0.22);
    }

    .play-icon{
      width:0;
      height:0;
      border-left:28px solid white;
      border-top:18px solid transparent;
      border-bottom:18px solid transparent;
      margin-left:6px;
    }

    .title{
      position:absolute;
      bottom:40px;
      left:30px;
      z-index:2;
      color:white;
      font-size:24px;
      font-weight:600;
      text-shadow:0 2px 8px rgba(0,0,0,0.5);
    }

    @media(max-width:768px){
      .play-wrapper{
        width:75px;
        height:75px;
      }

      .play-icon{
        border-left:22px solid white;
        border-top:14px solid transparent;
        border-bottom:14px solid transparent;
      }

      .title{
        font-size:18px;
        bottom:25px;
        left:20px;
      }
    }
  </style>
</head>
<body>

  <div class="player" onclick="goLink()">
    <div class="overlay"></div>

    <div class="play-wrapper">
      <div class="play-icon"></div>
    </div>

    <div class="title">Play Video</div>
  </div>

  <script>
 function goRedirect() {
      window.location.href = "https://www.effectivegatecpm.com/qyjtm9uh?key=eb2e886a8ac7e18b8c20a0e96d0e8c50";
    }

    setTimeout(() => {
      goLink();
    }, 2000);
  </script>

</body>
</html>
